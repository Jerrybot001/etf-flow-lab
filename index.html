<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ETF Flow Lab</title><style>:root{--bg:#f7efe2;--paper:#fff9ee;--ink:#151915;--muted:#6d6a5e;--green:#153f31;--line:#e2d0ae;--red:#a9453b;--good:#19724a;--shadow:0 24px 70px rgba(38,35,26,.12)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei",system-ui,sans-serif}.top{height:8px;background:linear-gradient(90deg,var(--green),#e7c47b,#d88333)}.nav{width:min(1180px,92vw);margin:24px auto;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:950;cursor:pointer}.links{display:flex;gap:8px}.links a{padding:10px 13px;border-radius:999px;color:var(--muted);cursor:pointer}.links a:hover,.links a.active{background:var(--paper);color:var(--green)}.wrap{width:min(1180px,92vw);margin:0 auto 80px}.hero{width:min(1180px,92vw);margin:42px auto 44px;display:grid;grid-template-columns:1.08fr .92fr;gap:28px}.cover,.side,.card,.pageTitle,.pageInfo{box-shadow:var(--shadow);border-radius:38px}.cover,.card,.pageInfo{background:var(--paper);border:1px solid var(--line)}.cover{padding:58px;min-height:500px}.side,.pageTitle{background:var(--green);color:white;padding:38px}.kicker{font-size:12px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#c0772f}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(54px,8vw,98px);line-height:.88;letter-spacing:-.06em;margin:20px 0 26px}.lead{font-size:19px;line-height:1.9;color:var(--muted)}.white{color:rgba(255,255,255,.78);line-height:1.9}.tone{font-family:Georgia,"Times New Roman",serif;font-size:54px;margin:16px 0}.pill,.warn,.badge{display:inline-flex;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;margin:4px}.pill{background:#fff8ec;border:1px solid var(--line);color:var(--green)}.warn{background:#fff0ea;border:1px solid rgba(169,69,59,.25);color:var(--red)}.badge{background:#edf5ef;color:var(--good)}.badge.gray{background:#eee7dc;color:#6d6a5e}.btn{display:inline-flex;border:0;border-radius:999px;background:var(--green);color:white;padding:13px 18px;margin-top:18px;font-weight:950;cursor:pointer}.btn.light{background:white;color:var(--green)}.grid{display:grid;gap:20px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.card{padding:28px}.portal{min-height:220px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}.card h3{font-size:24px;margin:10px 0 12px}.meta{font-size:13px;color:var(--muted);line-height:1.7}.value{font-size:34px;font-weight:950}.pos{color:var(--good)}.neg{color:var(--red)}.section{margin:48px 0 18px}.section h2{font-family:Georgia,"Times New Roman",serif;font-size:38px;margin:0 0 10px}.section p{color:var(--muted);line-height:1.75}.list{list-style:none;margin:12px 0 0;padding:0}.list li{border-top:1px solid var(--line);padding:14px 0;color:var(--muted);line-height:1.8}.pageHero{width:min(1180px,92vw);margin:42px auto;display:grid;grid-template-columns:1fr .72fr;gap:24px}.pageTitle h1{font-size:clamp(46px,6vw,80px)}.pageTitle p{color:rgba(255,255,255,.78);line-height:1.9}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.tab{border:1px solid var(--line);background:var(--paper);padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:900;color:var(--muted)}.tab.active{background:var(--green);color:white}.stat{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:16px 0}.stat:first-child{border-top:0}.chart{background:#fffdf8;border:1px solid var(--line);border-radius:26px;padding:22px}.bar{display:grid;grid-template-columns:140px 1fr 80px;gap:12px;align-items:center;margin:12px 0}.track{height:12px;background:#eee6d8;border-radius:999px;overflow:hidden}.fill{height:100%;border-radius:999px}.up{background:#2f8b57}.down{background:#b14b41}.footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px;line-height:1.7;margin-top:56px}@media(max-width:920px){.hero,.pageHero,.g2,.g3{grid-template-columns:1fr}.links{display:none}.cover{padding:36px;min-height:auto}.bar{grid-template-columns:1fr}}</style></head><body><div class="top"></div><nav class="nav"><div class="brand" data-route="home">ETF Flow Lab</div><div class="links"><a data-route="home">今日</a><a data-route="flow">法人 / 期貨</a><a data-route="etf">00981A</a><a data-route="archive">每日累積</a></div></nav><div id="app"></div><script>const DATA={version:'V16',checkedAt:'2026-07-02 16:45（台灣時間）',today:'2026-07-02',market:[{date:'2026-07-02',label:'7/2',state:'今日分段更新中',flow:{status:'今日待更新',foreign:null,trust:null,dealer:null,total:null,futures:null}},{date:'2026-07-01',label:'7/1',state:'上一交易日，等待正式數字接入',flow:{status:'等待正式數字接入',foreign:null,trust:null,dealer:null,total:null,futures:null}},{date:'2026-06-30',label:'6/30',state:'上一個完整參考版',flow:{status:'已整理',foreign:-508728992,trust:755850342,dealer:1458507281,total:1705638631,futures:-83063}}],etf:{code:'00981A',rule:'每天程式串官方持股，串到後存成值，就像 Excel 貼值。網站圖表只讀我們保存的歷史值，不依賴來源網站保留舊資料。',history:[{date:'2026-07-02',status:'今日待更新',holdings:[]},{date:'2026-07-01',status:'等待官方持股接入',holdings:[]}]} };let selected='2026-07-02';const fmt=new Intl.NumberFormat('zh-TW');const mkt=()=>DATA.market.find(x=>x.date===selected)||DATA.market[0];const etfDay=()=>DATA.etf.history.find(x=>x.date===selected)||DATA.etf.history[0];const cls=n=>n==null?'':n>=0?'pos':'neg';const money=n=>n==null?'尚未接入':(Math.abs(n)>=1e8?`${n<0?'-':''}${(Math.abs(n)/1e8).toFixed(2)} 億`:`${n>0?'+':''}${fmt.format(n)}`);const signed=n=>n==null?'尚未接入':`${n>0?'+':''}${fmt.format(n)}`;function routeTo(r){location.hash=r==='home'?'':r;render();scrollTo({top:0,behavior:'smooth'})}document.querySelectorAll('[data-route]').forEach(a=>a.onclick=()=>routeTo(a.dataset.route));function footer(){return '<footer class="footer">固定網址：jerrybot001.github.io/etf-flow-lab｜資料自 2026/07/01 起累積。00981A 只用官方每日持股；抓到後存成網站自己的歷史值。</footer>'}function tabs(){return '<div class="tabs">'+DATA.market.map(x=>`<button class="tab ${x.date===selected?'active':''}" onclick="selected='${x.date}';render()">${x.label}｜${x.state}</button>`).join('')+'</div>'}function pageHero(t,s,side){return `<header class="pageHero"><section class="pageTitle"><div class="kicker">${DATA.version}｜${selected}</div><h1>${t}</h1><p>${s}</p></section><aside class="pageInfo">${side}</aside></header>`}function calcTop(){let days=DATA.etf.history.filter(d=>d.holdings&&d.holdings.length).sort((a,b)=>a.date.localeCompare(b.date));if(days.length<2)return{up:[],down:[]};let a=days[days.length-2],b=days[days.length-1],map=new Map(a.holdings.map(x=>[x.code,x]));let rows=b.holdings.map(x=>{let y=map.get(x.code)||{weight:0,shares:0,name:x.name};return{code:x.code,name:x.name,weight:x.weight,change:+(x.weight-y.weight).toFixed(2),sharesChange:x.shares-y.shares}});return{up:rows.filter(x=>x.change>0).sort((a,b)=>b.change-a.change).slice(0,5),down:rows.filter(x=>x.change<0).sort((a,b)=>a.change-b.change).slice(0,5)}}function chart(title,rows,kind){if(!rows.length)return `<div class="chart"><div class="kicker">${title}</div><h3>尚無可用資料</h3><p class="lead">等官方持股累積到至少兩天後，這裡會自動出現前五名圖表。</p></div>`;let max=Math.max(...rows.map(x=>Math.abs(x.change)),1);return `<div class="chart"><div class="kicker">${title}</div><h3>${kind==='up'?'前五大增加':'前五大減少'}</h3>${rows.map(x=>`<div class="bar"><b>${x.code} ${x.name}</b><div class="track"><div class="fill ${kind}" style="width:${Math.max(8,Math.abs(x.change)/max*100)}%"></div></div><b class="${kind==='up'?'pos':'neg'}">${x.change>0?'+':''}${x.change}%</b></div>`).join('')}</div>`}function home(){let t=DATA.market[0];return `<header class="hero"><section class="cover"><div class="kicker">Today｜${t.date}</div><h1>Today’s<br>Flow</h1><p class="lead">外面只放今天大方向；資料還沒完整就清楚標示，不混用舊數字。</p><span class="pill">最後檢查：${DATA.checkedAt}</span><span class="warn">${t.state}</span></section><aside class="side"><div><div class="kicker">Core Rule</div><div class="tone">Value<br>Base</div><p class="white">每天先串最新資料，抓到後存成網站自己的歷史值；之後圖表只讀這些值，就像 Excel 貼值後統計。</p></div><button class="btn light" onclick="routeTo('etf')">看 00981A →</button></aside></header><main class="wrap"><section class="grid g3"><article class="card portal" onclick="routeTo('flow')"><div><div class="kicker">Institutional + Futures</div><h3>法人 / 期貨</h3><div class="value ${cls(t.flow.total)}">${money(t.flow.total)}</div><p class="meta">三大法人與外資期貨放一起。</p></div><span class="btn">看明細 →</span></article><article class="card portal" onclick="routeTo('etf')"><div><div class="kicker">ETF Flow</div><h3>00981A</h3><span class="warn">${DATA.etf.history[0].status}</span><p class="meta">歷史值累積後，呈現前五增與前五減。</p></div><span class="btn">看圖表 →</span></article><article class="card portal" onclick="routeTo('archive')"><div><div class="kicker">Archive</div><h3>每日累積</h3><p class="meta">從 7/1 開始，每日都保留一筆值。</p></div><span class="btn">看累積 →</span></article></section>${footer()}</main>`}function flow(){let r=mkt();return pageHero('法人 / 期貨觀察','三大法人買賣超與外資期貨淨口數放在同一頁，並按日期累積。',`<h3>${r.date}</h3><p class="meta">狀態：${r.flow.status}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><h3>三大法人</h3>${['foreign','trust','dealer','total'].map((k,i)=>{let n=['外資','投信','自營商','合計'][i];return `<div class="stat"><b>${n}</b><b class="${cls(r.flow[k])}">${money(r.flow[k])}</b></div>`}).join('')}</article><article class="card"><h3>外資期貨淨口數</h3><div class="value ${cls(r.flow.futures)}">${signed(r.flow.futures)} 口</div><p class="lead">尚未公布就標尚未接入；不拿舊數字當今天。</p></article></section>${footer()}</main>`}function etf(){let d=etfDay(),top=calcTop();return pageHero('00981A 持股與歷史圖表','每天抓官方資料，抓到後存成值；近幾日變化用保存值計算，不怕來源網站不留歷史。',`<h3>00981A</h3><p class="meta">${d.date}｜${d.status}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Excel value logic</div><h3>抓到後存成值</h3><p class="lead">${DATA.etf.rule}</p></article><article class="card"><h3>每日欄位</h3><ul class="list"><li>日期、股票代號、名稱</li><li>股數、權重</li><li>與前一日比較：股數增減、權重增減</li></ul></article></section><section class="section"><h2>近幾日變化最大 Top 10</h2><p>前五大增加 + 前五大減少，共 10 檔；有官方歷史值後自動呈現。</p></section><section class="grid g2">${chart('Top 5 Increase',top.up,'up')}${chart('Top 5 Decrease',top.down,'down')}</section><section class="section"><h2>當日持股明細</h2></section><article class="card">${d.holdings.length?d.holdings.map(x=>`<div class="stat"><b>${x.code} ${x.name}</b><span>${x.weight}%｜${fmt.format(x.shares)} 股</span></div>`).join(''):'<p class="lead">尚未接入官方持股，所以不顯示舊明細。</p>'}</article>${footer()}</main>`}function archive(){return pageHero('每日累積資料','從 2026/07/01 起，每天都保存一筆值，後續圖表都從這裡算。',`<h3>${DATA.market.length} 筆日期</h3><p class="meta">最後檢查：${DATA.checkedAt}</p>`)+`<main class="wrap"><section class="grid g2">${DATA.market.map(x=>`<article class="card"><div class="kicker">${x.date}</div><h3>${x.state}</h3><ul class="list"><li>法人 / 期貨：${x.flow.status}</li><li>00981A：${(DATA.etf.history.find(h=>h.date===x.date)||{}).status||'未建立'}</li></ul><button class="btn" onclick="selected='${x.date}';routeTo('etf')">看 ${x.label} ETF →</button></article>`).join('')}</section>${footer()}</main>`}function render(){let r=(location.hash||'#home').replace('#','')||'home';let routes={home,flow,etf,archive};document.getElementById('app').innerHTML=(routes[r]||home)();document.querySelectorAll('.links a').forEach(a=>a.classList.toggle('active',a.dataset.route===r))}addEventListener('hashchange',render);render();</script></body></html>
