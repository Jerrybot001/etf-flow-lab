<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>ETF Flow Lab｜每日資金流向</title>
<style>
:root{--bg:#f7efe2;--paper:#fff9ee;--ink:#151915;--muted:#706b5e;--green:#153f31;--gold:#c7953e;--line:#e2d0ae;--red:#a9453b;--good:#19724a;--shadow:0 28px 88px rgba(38,35,26,.13)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif}a{color:inherit;text-decoration:none}.top{height:8px;background:linear-gradient(90deg,var(--green),#e7c47b,#d88333)}.nav{width:min(1180px,92vw);margin:24px auto;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;gap:12px;align-items:center;font-weight:950;cursor:pointer}.logo{width:50px;height:50px;border-radius:50%;background:var(--green);color:#fff;display:grid;place-items:center;font-weight:950;font-size:24px}.links{display:flex;gap:8px;color:var(--muted);font-size:14px}.links a{padding:10px 13px;border-radius:999px;cursor:pointer}.links a:hover,.links a.active{background:var(--paper);color:var(--green)}.wrap{width:min(1180px,92vw);margin:0 auto 90px}.hero{width:min(1180px,92vw);margin:42px auto 56px;display:grid;grid-template-columns:1.08fr .92fr;gap:28px}.cover,.side,.card,.pageInfo,.pageTitle{box-shadow:var(--shadow)}.cover{background:var(--paper);border:1px solid var(--line);border-radius:46px;padding:62px;min-height:570px;position:relative;overflow:hidden}.cover:before{content:"";position:absolute;right:-120px;top:70px;width:320px;height:320px;border-radius:50%;background:rgba(199,149,62,.17)}.cover:after{content:"";position:absolute;left:62px;bottom:46px;width:170px;height:14px;border-radius:999px;background:var(--green)}.kicker{font-size:12px;font-weight:950;letter-spacing:.18em;text-transform:uppercase;color:#c0772f}h1{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:clamp(58px,8vw,108px);line-height:.86;letter-spacing:-.07em;font-weight:600;margin:22px 0 28px}.lead{font-size:19px;line-height:1.95;color:var(--muted);max-width:820px}.side{background:var(--green);color:white;border-radius:46px;padding:40px;display:flex;flex-direction:column;justify-content:space-between}.tone{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:62px;line-height:.95;margin:16px 0 22px}.white{color:rgba(255,255,255,.76);line-height:1.9}.pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}.pill,.warn,.badge{display:inline-flex;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900}.pill{border:1px solid var(--line);background:#fff8ec;color:var(--green)}.warn{border:1px solid rgba(169,69,59,.25);background:#fff0ea;color:var(--red)}.badge{background:#edf5ef;color:var(--good)}.badge.gray{background:#eee7dc;color:#6d6a5e}.btn{display:inline-flex;width:max-content;align-items:center;justify-content:center;border-radius:999px;background:var(--green);color:white;padding:13px 18px;margin-top:20px;font-weight:950;cursor:pointer;border:0}.btn.light{background:white;color:var(--green)}.section{margin:54px 0 18px}.section h2{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:42px;line-height:1;margin:0 0 10px}.section p{color:var(--muted);line-height:1.75}.grid{display:grid;gap:22px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.card{background:var(--paper);border:1px solid var(--line);border-radius:34px;padding:30px}.portal{min-height:260px;display:flex;flex-direction:column;justify-content:space-between;transition:.18s;cursor:pointer}.portal:hover{transform:translateY(-5px)}.card h3{font-size:25px;letter-spacing:-.03em;margin:10px 0 13px}.meta{font-size:13px;color:var(--muted);line-height:1.7}.value{font-size:36px;font-weight:950;letter-spacing:-.05em;margin-top:8px}.pos{color:var(--good)}.neg{color:var(--red)}.list{list-style:none;margin:16px 0 0;padding:0}.list li{border-top:1px solid var(--line);padding:15px 0;color:var(--muted);line-height:1.8}.pageHero{width:min(1180px,92vw);margin:42px auto;display:grid;grid-template-columns:1fr .72fr;gap:24px}.pageTitle{background:var(--green);color:white;border-radius:44px;padding:48px}.pageTitle h1{font-size:clamp(48px,6vw,84px)}.pageTitle p{color:rgba(255,255,255,.76);font-size:18px;line-height:1.9}.pageInfo{background:var(--paper);border:1px solid var(--line);border-radius:44px;padding:34px}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:22px 0}.tab{border:1px solid var(--line);background:var(--paper);padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:900;color:var(--muted)}.tab.active{background:var(--green);color:white}.stat{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding:18px 0}.stat:first-child{border-top:0}.empty{border:1px dashed var(--line);background:#fffdf8;border-radius:28px;padding:34px}.footer{border-top:1px solid var(--line);padding:34px 0;color:var(--muted);font-size:13px;line-height:1.7;margin-top:60px}.small{font-size:12px;color:var(--muted)}@media(max-width:920px){.hero,.pageHero,.g2,.g3{grid-template-columns:1fr}.links{display:none}.cover{padding:38px;min-height:auto}.cover:after{display:none}}
</style>
</head>
<body>
<div class="top"></div>
<nav class="nav"><a class="brand" data-route="home"><span class="logo">F</span><span>ETF Flow Lab</span></a><div class="links"><a data-route="home">今日</a><a data-route="flow">法人 / 期貨</a><a data-route="etf">ETF</a><a data-route="indices">指數</a><a data-route="archive">每日累積</a></div></nav>
<div id="app"></div>
<script>
const DATA={version:'V14',checkedAt:'2026-07-02 10:30（台灣時間）',publishNote:'如果當天資料還沒完整更新，首頁先保留今日日期與最後檢查時間，數字沿用上一個完整盤後版，不混用不完整資料。',records:[{date:'2026-07-01',label:'7/1',state:'待完整更新',headline:'7/1 資料頁已建立；官方資料尚未完整串接前，不放假數字。',tone:'待更新',summary:'7/1 先建立今日大類與明細頁。00981A、三大法人、外資期貨與國際指數若沒有正式來源，就標待更新；外部首頁仍顯示今天，但數字採上一個完整盤後版作參考。',etf:{status:'待更新',note:'只接受統一投信官方每日持股。尚未抓到前，不顯示舊持股。'},flow:{status:'待更新',foreign:null,trust:null,dealer:null,total:null,futures:null,note:'三大法人與外資期貨會放在同一頁；7/1 正式數字待更新。'},indices:{status:'待接正式來源',note:'日股、韓股用當日收盤；美股用前一交易日收盤。未接來源前不放假數字。'},watch:['等待 7/1 三大法人正式資料','等待 7/1 外資期貨淨口數','等待 00981A 官方每日持股']},{date:'2026-06-30',label:'6/30',state:'上一個完整盤後版',headline:'6/30 完整盤後資料：三大法人合計買超，但外資現貨賣超，期貨空單偏高。',tone:'中性偏保守',summary:'這是目前上一個完整盤後版本。若 7/1 尚未完整更新，首頁會顯示今日狀態，但參考數字沿用此版。',etf:{status:'待更新',note:'00981A 尚未接官方每日持股，因此不顯示舊明細。'},flow:{status:'已整理',foreign:-508728992,trust:755850342,dealer:1458507281,total:1705638631,futures:-83063,note:'三大法人合計買超 17.06 億元；外資現貨賣超 5.09 億元，投信與自營商偏買。外資期貨淨口數 -83,063 口，代表避險或偏空壓力仍高。'},indices:{status:'待接正式來源',note:'未接合法行情來源前，不顯示假行情。'},watch:['觀察外資期貨淨空單是否縮小','觀察投信買超是否延續','等待 00981A 官方持股串接']}]};
let selected='2026-07-01';const fmt=new Intl.NumberFormat('zh-TW');const money=n=>n==null?'待更新':(Math.abs(n)>=1e8?`${n<0?'-':''}${(Math.abs(n)/1e8).toFixed(2)} 億`:`${n>0?'+':''}${fmt.format(n)}`);const signed=n=>n==null?'待更新':`${n>0?'+':''}${fmt.format(n)}`;const cls=n=>n==null?'':n>=0?'pos':'neg';const rec=()=>DATA.records.find(x=>x.date===selected)||DATA.records[0];const prev=()=>DATA.records.find(x=>x.state.includes('完整'))||DATA.records[1];
function routeTo(r){location.hash=r==='home'?'':r;render();scrollTo({top:0,behavior:'smooth'})}document.querySelectorAll('[data-route]').forEach(a=>a.onclick=()=>routeTo(a.dataset.route));function footer(){return `<footer class="footer">固定網址：jerrybot001.github.io/etf-flow-lab｜資料自 2026/07/01 起開始累積。所有時間統一台灣時間。研究用途，不構成投資建議。</footer>`}function tabs(){return `<div class="tabs">${DATA.records.map(x=>`<button class="tab ${x.date===selected?'active':''}" onclick="selected='${x.date}';render()">${x.label}｜${x.state}</button>`).join('')}</div>`}
function pageHero(t,s,side){return `<header class="pageHero"><section class="pageTitle"><div class="kicker">${DATA.version}｜${rec().date}｜${rec().state}</div><h1>${t}</h1><p>${s}</p></section><aside class="pageInfo">${side}</aside></header>`}
function home(){const r=DATA.records[0],p=prev();return `<header class="hero"><section class="cover"><div class="kicker">Today｜${r.date}｜台灣時間</div><h1>Today’s<br>Flow</h1><p class="lead">${r.headline}</p><div class="pills"><span class="pill">最後檢查：${DATA.checkedAt}</span><span class="warn">${r.state}</span><span class="pill">參考完整版：${p.date}</span></div></section><aside class="side"><div><div class="kicker">Today Tone</div><div class="tone">${r.tone}</div><p class="white">${r.summary}</p></div><button class="btn light" onclick="routeTo('archive')">看每日累積 →</button></aside></header><main class="wrap"><section class="grid g3"><article class="card portal" onclick="routeTo('flow')"><div><div class="kicker">Institutional + Futures</div><h3>法人 / 期貨</h3><div class="value ${cls(p.flow.total)}">${money(p.flow.total)}</div><p class="meta">今日：${r.flow.status}；先參考 ${p.date} 完整版。</p></div><span class="btn">看明細 →</span></article><article class="card portal" onclick="routeTo('etf')"><div><div class="kicker">ETF Flow</div><h3>00981A 持股</h3><span class="warn">${r.etf.status}</span><p class="meta" style="margin-top:14px">只用官方每日持股，沒有就不顯示舊資料。</p></div><span class="btn">看狀態 →</span></article><article class="card portal" onclick="routeTo('indices')"><div><div class="kicker">Global Pulse</div><h3>國際指數</h3><span class="badge gray">${r.indices.status}</span><p class="meta" style="margin-top:14px">沒有正式來源就不放假行情。</p></div><span class="btn">看狀態 →</span></article></section><section class="section"><h2>今天在外面看方向，點進去看每日明細。</h2><p>${DATA.publishNote}</p></section><section class="grid g2"><article class="card"><div class="kicker">Today Watch</div><h3>今日待更新</h3><ul class="list">${r.watch.map(x=>`<li>${x}</li>`).join('')}</ul></article><article class="card"><div class="kicker">Previous Complete</div><h3>${p.date} 完整版摘要</h3><p class="lead">${p.flow.note}</p></article></section>${footer()}</main>`}
function flow(){const r=rec();return pageHero('法人 / 期貨觀察','三大法人買賣超與外資期貨淨口數放在同一頁，並且按日期累積。',`<div class="kicker">Selected Date</div><h3>${r.date}</h3><p class="meta">狀態：${r.flow.status}</p><p class="small">最後檢查：${DATA.checkedAt}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Cash Market</div><h3>三大法人買賣超</h3>${['foreign','trust','dealer'].map((k,i)=>{const names=['外資','投信','自營商'];return `<div class="stat"><div><b>${names[i]}</b><div class="meta">當日淨買賣超</div></div><div class="value ${cls(r.flow[k])}">${money(r.flow[k])}</div></div>`}).join('')}<div class="stat"><div><b>合計</b><div class="meta">三大法人合計</div></div><div class="value ${cls(r.flow.total)}">${money(r.flow.total)}</div></div></article><article class="card"><div class="kicker">Futures Market</div><h3>外資期貨淨口數</h3><div class="value ${cls(r.flow.futures)}">${signed(r.flow.futures)} 口</div><p class="lead">${r.flow.note}</p></article></section>${footer()}</main>`}
function etf(){const r=rec();return pageHero('00981A 持股資料','只用官方每日投資組合；沒有正式來源就標待更新，不用舊資料。',`<div class="kicker">ETF</div><h3>00981A</h3><p class="meta">狀態：${r.etf.status}</p><p class="small">${DATA.checkedAt}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Data Status</div><h3>${r.etf.status}</h3><p class="lead">${r.etf.note}</p></article><article class="card"><div class="kicker">接好後會顯示</div><h3>每日持股變化欄位</h3><ul class="list"><li>股票代號 / 名稱</li><li>昨日股數 / 今日股數 / 股數變化</li><li>昨日權重 / 今日權重 / 權重變化</li><li>新增 / 加碼 / 減碼 / 刪除</li></ul></article></section><article class="empty"><div class="kicker">No fake data</div><h3>目前不顯示舊持股明細</h3><p class="lead">等官方每日投資組合抓到後，這裡才會出現 ${r.date} 的明細。</p></article>${footer()}</main>`}
function indices(){const r=rec();return pageHero('國際指數','日韓用當日收盤，美股用前一交易日收盤；未接正式來源前不顯示假行情。',`<div class="kicker">Global</div><h3>${r.indices.status}</h3><p class="meta">${r.date}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Status</div><h3>${r.indices.status}</h3><p class="lead">${r.indices.note}</p></article><article class="card"><div class="kicker">Rule</div><h3>時間規則</h3><ul class="list"><li>美股：前一交易日收盤。</li><li>日股、韓股：當日收盤。</li><li>資料日期與更新時間都標台灣時間。</li></ul></article></section>${footer()}</main>`}
function archive(){return pageHero('每日累積資料','從 2026/07/01 開始，每一天都累積一筆。新版未完成時，保留舊版完整資料作參考。',`<div class="kicker">Archive</div><h3>${DATA.records.length} 筆日期資料</h3><p class="meta">最後檢查：${DATA.checkedAt}</p>`)+`<main class="wrap"><section class="grid g2">${DATA.records.map(r=>`<article class="card"><div class="kicker">${r.date}</div><h3>${r.state}</h3><p class="lead">${r.headline}</p><ul class="list"><li>法人 / 期貨：${r.flow.status}</li><li>00981A：${r.etf.status}</li><li>國際指數：${r.indices.status}</li></ul><button class="btn" onclick="selected='${r.date}';routeTo('flow')">看 ${r.label} 法人/期貨 →</button></article>`).join('')}</section>${footer()}</main>`}
function render(){const route=(location.hash||'#home').replace('#','')||'home';const routes={home,flow,etf,indices,archive};app.innerHTML=(routes[route]||home)();document.querySelectorAll('.links a').forEach(a=>a.classList.toggle('active',a.dataset.route===route))}addEventListener('hashchange',render);render();
</script>
</body>
</html>
