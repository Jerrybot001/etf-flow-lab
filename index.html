<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ETF Flow Lab</title><style>:root{--bg:#f7efe2;--paper:#fff9ee;--ink:#17201b;--muted:#6f6a5e;--green:#153f31;--line:#e1d0b1;--red:#a9453b;--good:#19724a;--shadow:0 24px 70px rgba(38,35,26,.12)}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei",system-ui,sans-serif}.top{height:8px;background:linear-gradient(90deg,var(--green),#e7c47b,#d88333)}.nav{width:min(1180px,92vw);margin:24px auto;display:flex;justify-content:space-between;align-items:center}.brand{font-weight:950;cursor:pointer}.links{display:flex;gap:8px}.links a{padding:10px 13px;border-radius:999px;color:var(--muted);cursor:pointer}.links a:hover,.links a.active{background:var(--paper);color:var(--green)}.wrap{width:min(1180px,92vw);margin:0 auto 80px}.hero{width:min(1180px,92vw);margin:42px auto 44px;display:grid;grid-template-columns:1.08fr .92fr;gap:28px}.cover,.side,.card,.pageTitle,.pageInfo{box-shadow:var(--shadow);border-radius:38px}.cover,.card,.pageInfo{background:var(--paper);border:1px solid var(--line)}.cover{padding:58px;min-height:520px;position:relative;overflow:hidden}.cover:after{content:"";position:absolute;left:58px;bottom:44px;width:160px;height:13px;border-radius:999px;background:var(--green)}.side,.pageTitle{background:var(--green);color:white;padding:38px}.kicker{font-size:12px;font-weight:950;letter-spacing:.16em;text-transform:uppercase;color:#c0772f}h1{font-family:Georgia,"Times New Roman",serif;font-size:clamp(56px,8vw,104px);line-height:.88;letter-spacing:-.06em;margin:20px 0 26px;font-weight:600}.lead{font-size:19px;line-height:1.9;color:var(--muted)}.white{color:rgba(255,255,255,.76);line-height:1.9}.tone{font-family:Georgia,"Times New Roman",serif;font-size:56px;margin:16px 0}.pill,.warn,.badge{display:inline-flex;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:900;margin:4px}.pill{background:#fff8ec;border:1px solid var(--line);color:var(--green)}.warn{background:#fff0ea;border:1px solid rgba(169,69,59,.25);color:var(--red)}.badge{background:#edf5ef;color:var(--good)}.badge.gray{background:#eee7dc;color:#6d6a5e}.btn{display:inline-flex;border:0;border-radius:999px;background:var(--green);color:white;padding:13px 18px;margin-top:18px;font-weight:950;cursor:pointer}.btn.light{background:white;color:var(--green)}.grid{display:grid;gap:20px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.card{padding:28px}.portal{min-height:235px;display:flex;flex-direction:column;justify-content:space-between;cursor:pointer}.card h3{font-size:24px;margin:10px 0 12px}.meta{font-size:13px;color:var(--muted);line-height:1.7}.value{font-size:34px;font-weight:950;margin-top:8px}.pos{color:var(--good)}.neg{color:var(--red)}.section{margin:48px 0 18px}.section h2{font-family:Georgia,"Times New Roman",serif;font-size:38px;margin:0 0 10px}.section p{color:var(--muted);line-height:1.75}.list{list-style:none;margin:12px 0 0;padding:0}.list li{border-top:1px solid var(--line);padding:14px 0;color:var(--muted);line-height:1.8}.pageHero{width:min(1180px,92vw);margin:42px auto;display:grid;grid-template-columns:1fr .72fr;gap:24px}.pageTitle h1{font-size:clamp(46px,6vw,80px)}.pageTitle p{color:rgba(255,255,255,.76);line-height:1.9}.tabs{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0}.tab{border:1px solid var(--line);background:var(--paper);padding:10px 14px;border-radius:999px;cursor:pointer;font-weight:900;color:var(--muted)}.tab.active{background:var(--green);color:white}.stat{display:flex;justify-content:space-between;border-top:1px solid var(--line);padding:16px 0}.stat:first-child{border-top:0}.empty{border:1px dashed var(--line);background:#fffdf8;border-radius:28px;padding:30px}.footer{border-top:1px solid var(--line);padding:30px 0;color:var(--muted);font-size:13px;line-height:1.7;margin-top:56px}@media(max-width:920px){.hero,.pageHero,.g2,.g3{grid-template-columns:1fr}.links{display:none}.cover{padding:36px;min-height:auto}.cover:after{display:none}}</style></head><body><div class="top"></div><nav class="nav"><div class="brand" data-route="home">ETF Flow Lab</div><div class="links"><a data-route="home">今日</a><a data-route="flow">法人 / 期貨</a><a data-route="etf">ETF</a><a data-route="indices">指數</a><a data-route="archive">每日累積</a></div></nav><div id="app"></div><script>const DATA={version:'V15',checkedAt:'2026-07-02 16:25（台灣時間）',today:'2026-07-02',records:[{date:'2026-07-02',label:'7/2',state:'今日分段更新中',headline:'7/2 是今天，今天的盤後資料才是待更新。',tone:'分段更新中',summary:'首頁顯示今天 7/2。尚未公布的項目標待更新，不混用舊數字。',etf:{status:'今日待更新',note:'等待 7/2 官方每日持股。'},flow:{status:'今日待更新',foreign:null,trust:null,dealer:null,total:null,futures:null,note:'等待 7/2 三大法人與外資期貨資料。'},indices:{status:'今日待更新 / 待接來源',note:'等待正式來源。'},watch:['14:00 後看台股收盤','16:00 後看法人 / 期貨','21:00 產出完整日報']},{date:'2026-07-01',label:'7/1',state:'上一交易日：應完成日',headline:'7/1 不是今日待更新；它是上一交易日，已建立完整日期頁。',tone:'等待正式數字接入',summary:'7/1 已歸檔為上一交易日。不再寫待更新；如果數字尚未接入，就寫等待正式數字接入。',etf:{status:'等待官方持股接入',note:'只接受 7/1 官方每日持股，沒有就不放舊明細。'},flow:{status:'等待正式數字接入',foreign:null,trust:null,dealer:null,total:null,futures:null,note:'7/1 是應可統計日；目前等待正式三大法人與外資期貨數字接入，不亂填。'},indices:{status:'等待正式來源接入',note:'等待正式行情來源，不放假數字。'},watch:['補 7/1 三大法人','補 7/1 外資期貨','補 7/1 00981A 官方持股']},{date:'2026-06-30',label:'6/30',state:'上一個完整參考版',headline:'6/30 完整盤後資料：三大法人合計買超，但外資現貨賣超，期貨空單偏高。',tone:'中性偏保守',summary:'目前可作為已整理參考版。',etf:{status:'待接官方持股',note:'未接官方每日持股，不顯示舊明細。'},flow:{status:'已整理',foreign:-508728992,trust:755850342,dealer:1458507281,total:1705638631,futures:-83063,note:'三大法人合計買超 17.06 億元；外資現貨賣超 5.09 億元。外資期貨淨口數 -83,063 口。'},indices:{status:'待接正式來源',note:'未接正式來源前不顯示假行情。'},watch:['觀察外資期貨淨空單是否縮小','觀察投信買超是否延續','等待 00981A 官方持股串接']} ]};let selected='2026-07-02';const fmt=new Intl.NumberFormat('zh-TW');const rec=()=>DATA.records.find(x=>x.date===selected)||DATA.records[0];const lastComplete=()=>DATA.records.find(x=>x.flow.status==='已整理')||DATA.records[2];const cls=n=>n==null?'':n>=0?'pos':'neg';const money=n=>n==null?'尚未接入':(Math.abs(n)>=1e8?`${n<0?'-':''}${(Math.abs(n)/1e8).toFixed(2)} 億`:`${n>0?'+':''}${fmt.format(n)}`);const signed=n=>n==null?'尚未接入':`${n>0?'+':''}${fmt.format(n)}`;function routeTo(r){location.hash=r==='home'?'':r;render();scrollTo({top:0,behavior:'smooth'})}document.querySelectorAll('[data-route]').forEach(a=>a.onclick=()=>routeTo(a.dataset.route));function footer(){return '<footer class="footer">固定網址：jerrybot001.github.io/etf-flow-lab｜資料自 2026/07/01 起累積。所有時間統一台灣時間。</footer>'}function tabs(){return `<div class="tabs">${DATA.records.map(x=>`<button class="tab ${x.date===selected?'active':''}" onclick="selected='${x.date}';render()">${x.label}｜${x.state}</button>`).join('')}</div>`}function pageHero(t,s,side){const r=rec();return `<header class="pageHero"><section class="pageTitle"><div class="kicker">${DATA.version}｜${r.date}｜${r.state}</div><h1>${t}</h1><p>${s}</p></section><aside class="pageInfo">${side}</aside></header>`}function home(){const t=DATA.records[0],lc=lastComplete();return `<header class="hero"><section class="cover"><div class="kicker">Today｜${t.date}｜台灣時間</div><h1>Today’s<br>Flow</h1><p class="lead">${t.headline}</p><div><span class="pill">最後檢查：${DATA.checkedAt}</span><span class="warn">${t.state}</span><span class="pill">最近完整參考：${lc.date}</span></div></section><aside class="side"><div><div class="kicker">Today Tone</div><div class="tone">${t.tone}</div><p class="white">${t.summary}</p></div><button class="btn light" onclick="routeTo('archive')">看每日累積 →</button></aside></header><main class="wrap"><section class="grid g3"><article class="card portal" onclick="routeTo('flow')"><div><div class="kicker">Institutional + Futures</div><h3>法人 / 期貨</h3><div class="value ${cls(t.flow.total)}">${money(t.flow.total)}</div><p class="meta">今天 ${t.label}：${t.flow.status}；7/1 已歸檔，不再標今日待更新。</p></div><span class="btn">看明細 →</span></article><article class="card portal" onclick="routeTo('etf')"><div><div class="kicker">ETF Flow</div><h3>00981A 持股</h3><span class="warn">${t.etf.status}</span><p class="meta" style="margin-top:14px">只用官方每日持股。</p></div><span class="btn">看狀態 →</span></article><article class="card portal" onclick="routeTo('indices')"><div><div class="kicker">Global Pulse</div><h3>國際指數</h3><span class="badge gray">${t.indices.status}</span><p class="meta" style="margin-top:14px">沒有正式來源就不放假行情。</p></div><span class="btn">看狀態 →</span></article></section><section class="section"><h2>外面是今天，裡面按日期累積。</h2><p>7/2 才是今日待更新；7/1 改成上一交易日資料頁。</p></section><section class="grid g2"><article class="card"><div class="kicker">Today Watch</div><h3>7/2 今日待辦</h3><ul class="list">${t.watch.map(x=>`<li>${x}</li>`).join('')}</ul></article><article class="card"><div class="kicker">7/1 Archive</div><h3>7/1 已改成上一交易日</h3><p class="lead">7/1 不再顯示待更新。數字尚未取得時，寫等待正式數字接入。</p></article></section>${footer()}</main>`}function flow(){const r=rec();return pageHero('法人 / 期貨觀察','三大法人與外資期貨放在同一頁，並按日期累積。',`<div class="kicker">Selected Date</div><h3>${r.date}</h3><p class="meta">狀態：${r.flow.status}</p><p class="small">最後檢查：${DATA.checkedAt}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Cash Market</div><h3>三大法人買賣超</h3>${['foreign','trust','dealer'].map((k,i)=>{const n=['外資','投信','自營商'];return `<div class="stat"><div><b>${n[i]}</b><div class="meta">當日淨買賣超</div></div><div class="value ${cls(r.flow[k])}">${money(r.flow[k])}</div></div>`}).join('')}<div class="stat"><div><b>合計</b><div class="meta">三大法人合計</div></div><div class="value ${cls(r.flow.total)}">${money(r.flow.total)}</div></div></article><article class="card"><div class="kicker">Futures Market</div><h3>外資期貨淨口數</h3><div class="value ${cls(r.flow.futures)}">${signed(r.flow.futures)} 口</div><p class="lead">${r.flow.note}</p></article></section>${footer()}</main>`}function etf(){const r=rec();return pageHero('00981A 持股資料','只用官方每日投資組合；沒有正式來源就標清楚。',`<div class="kicker">ETF</div><h3>00981A</h3><p class="meta">狀態：${r.etf.status}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Data Status</div><h3>${r.etf.status}</h3><p class="lead">${r.etf.note}</p></article><article class="card"><div class="kicker">接好後會顯示</div><h3>每日持股變化欄位</h3><ul class="list"><li>股票代號 / 名稱</li><li>股數與權重變化</li><li>新增 / 加碼 / 減碼 / 刪除</li></ul></article></section><article class="empty"><div class="kicker">No fake data</div><h3>目前不顯示舊持股明細</h3><p class="lead">等官方每日投資組合抓到後，這裡才會出現 ${r.date} 的明細。</p></article>${footer()}</main>`}function indices(){const r=rec();return pageHero('國際指數','日韓用當日收盤，美股用前一交易日收盤。',`<div class="kicker">Global</div><h3>${r.indices.status}</h3><p class="meta">${r.date}</p>`)+`<main class="wrap">${tabs()}<section class="grid g2"><article class="card"><div class="kicker">Status</div><h3>${r.indices.status}</h3><p class="lead">${r.indices.note}</p></article><article class="card"><div class="kicker">Rule</div><h3>時間規則</h3><ul class="list"><li>美股：前一交易日收盤。</li><li>日股、韓股：當日收盤。</li><li>資料日期與更新時間都標台灣時間。</li></ul></article></section>${footer()}</main>`}function archive(){return pageHero('每日累積資料','從 2026/07/01 開始，每一天都累積一筆。',`<div class="kicker">Archive</div><h3>${DATA.records.length} 筆日期資料</h3><p class="meta">最後檢查：${DATA.checkedAt}</p>`)+`<main class="wrap"><section class="grid g2">${DATA.records.map(r=>`<article class="card"><div class="kicker">${r.date}</div><h3>${r.state}</h3><p class="lead">${r.headline}</p><ul class="list"><li>法人 / 期貨：${r.flow.status}</li><li>00981A：${r.etf.status}</li><li>國際指數：${r.indices.status}</li></ul><button class="btn" onclick="selected='${r.date}';routeTo('flow')">看 ${r.label} 法人 / 期貨 →</button></article>`).join('')}</section>${footer()}</main>`}function render(){const route=(location.hash||'#home').replace('#','')||'home';const routes={home,flow,etf,indices,archive};app.innerHTML=(routes[route]||home)();document.querySelectorAll('.links a').forEach(a=>a.classList.toggle('active',a.dataset.route===route))}addEventListener('hashchange',render);render();</script></body></html>
