<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ETF Flow Lab｜資金流向觀察站</title>
<style>
:root{--bg:#f7efe2;--paper:#fff9ee;--ink:#151915;--muted:#6d6a5e;--green:#153f31;--green2:#245b47;--gold:#c7953e;--line:#e2d0ae;--red:#a9453b;--good:#19724a;--shadow:0 28px 88px rgba(38,35,26,.13)}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:"Microsoft JhengHei","Noto Sans TC",system-ui,sans-serif}a{text-decoration:none;color:inherit}.top{height:8px;background:linear-gradient(90deg,var(--green),#e7c47b,#d88333)}.nav{width:min(1180px,92vw);margin:24px auto;display:flex;justify-content:space-between;align-items:center}.brand{display:flex;align-items:center;gap:12px;font-weight:950;cursor:pointer}.logo{width:50px;height:50px;border-radius:50%;background:var(--green);color:white;display:grid;place-items:center;font-size:24px;font-weight:950;box-shadow:0 16px 34px rgba(21,63,49,.24)}.links{display:flex;gap:8px;color:var(--muted);font-size:14px}.links a{padding:10px 13px;border-radius:999px;cursor:pointer}.links a:hover,.links a.active{background:var(--paper);color:var(--green)}.wrap{width:min(1180px,92vw);margin:0 auto 90px}.hero{width:min(1180px,92vw);margin:42px auto 56px;display:grid;grid-template-columns:1.12fr .88fr;gap:28px}.cover{background:var(--paper);border:1px solid var(--line);border-radius:46px;padding:64px;min-height:580px;box-shadow:var(--shadow);position:relative;overflow:hidden}.cover:before{content:"";position:absolute;right:-120px;top:70px;width:320px;height:320px;border-radius:50%;background:rgba(199,149,62,.17)}.cover:after{content:"";position:absolute;left:64px;bottom:46px;width:170px;height:14px;border-radius:999px;background:var(--green)}.kicker{font-size:12px;font-weight:950;letter-spacing:.18em;text-transform:uppercase;color:#c0772f}h1{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:clamp(60px,8vw,112px);line-height:.86;letter-spacing:-.07em;font-weight:600;margin:22px 0 28px}.lead{font-size:19px;line-height:1.95;color:var(--muted);max-width:780px}.side{background:var(--green);color:white;border-radius:46px;padding:40px;box-shadow:var(--shadow);display:flex;flex-direction:column;justify-content:space-between}.tone{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:68px;line-height:.95;margin:16px 0 22px}.white{color:rgba(255,255,255,.76);line-height:1.9}.pills{display:flex;gap:10px;flex-wrap:wrap;margin-top:26px}.pill{display:inline-flex;border:1px solid var(--line);background:#fff8ec;border-radius:999px;padding:9px 13px;font-size:13px;font-weight:900;color:var(--green)}.warning{display:inline-flex;border:1px solid rgba(169,69,59,.25);background:#fff0ea;border-radius:999px;padding:9px 13px;font-size:13px;font-weight:900;color:var(--red)}.btn{display:inline-flex;width:max-content;align-items:center;justify-content:center;border-radius:999px;background:var(--green);color:white;padding:13px 18px;margin-top:20px;font-weight:950;cursor:pointer;border:0}.btn:hover{background:var(--green2);transform:translateY(-1px)}.btn.light{background:white;color:var(--green)}.section{margin:54px 0 18px}.section h2{font-family:Georgia,"Times New Roman","Noto Serif TC",serif;font-size:44px;line-height:1;margin:0 0 10px}.section p{color:var(--muted);line-height:1.75}.grid{display:grid;gap:22px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.card{background:var(--paper);border:1px solid var(--line);border-radius:34px;padding:30px;box-shadow:var(--shadow)}.portal{min-height:270px;display:flex;flex-direction:column;justify-content:space-between;transition:.18s;cursor:pointer}.portal:hover{transform:translateY(-5px);box-shadow:0 34px 96px rgba(38,35,26,.18)}.card h3{font-size:25px;letter-spacing:-.03em;margin:10px 0 13px}.meta{font-size:13px;color:var(--muted);line-height:1.7}.value{font-size:38px;font-weight:950;letter-spacing:-.05em;margin-top:8px}.pos{color:var(--good)}.neg{color:var(--red)}.list{list-style:none;margin:16px 0 0;padding:0}.list li{border-top:1px solid var(--line);padding:15px 0;color:var(--muted);line-height:1.8}.pageHero{width:min(1180px,92vw);margin:42px auto;display:grid;grid-template-columns:1fr .72fr;gap:24px}.pageTitle{background:var(--green);color:white;border-radius:44px;padding:48px;box-shadow:var(--shadow)}.pageTitle h1{font-size:clamp(50px,6vw,86px)}.pageTitle p{color:rgba(255,255,255,.76);font-size:18px;line-height:1.9}.pageInfo{background:var(--paper);border:1px solid var(--line);border-radius:44px;padding:34px;box-shadow:var(--shadow)}.badge{display:inline-flex;border-radius:999px;padding:7px 10px;font-size:12px;font-weight:900;background:#edf5ef;color:var(--good)}.badge.gray{background:#eee7dc;color:#6d6a5e}.stat{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--line);padding:18px 0}.stat:first-child{border-top:0}.empty{border:1px dashed var(--line);background:#fffdf8;border-radius:28px;padding:34px}.footer{border-top:1px solid var(--line);padding:34px 0;color:var(--muted);font-size:13px;line-height:1.7;margin-top:60px}.admin{display:grid;grid-template-columns:300px 1fr;gap:24px}.adminMenu{background:var(--green);color:white;border-radius:34px;padding:28px;height:max-content;box-shadow:var(--shadow)}.adminMenu a{display:block;color:rgba(255,255,255,.75);border-top:1px solid rgba(255,255,255,.13);padding:13px 0;cursor:pointer}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}label{display:flex;flex-direction:column;gap:8px;font-size:13px;color:var(--muted);font-weight:900}input,textarea{border:1px solid var(--line);border-radius:17px;background:white;padding:14px 15px;font:inherit}textarea{min-height:150px}.code{background:#141c18;color:#e6f4ea;border-radius:22px;padding:18px;white-space:pre;overflow:auto;min-height:260px;margin-top:18px;font-family:ui-monospace,Consolas,monospace;font-size:13px}button{border:0;border-radius:999px;background:var(--green);color:white;padding:13px 18px;font-weight:950;margin-top:16px;cursor:pointer}@media(max-width:920px){.hero,.pageHero,.g2,.g3,.admin,.formgrid{grid-template-columns:1fr}.links{display:none}.cover{padding:38px;min-height:auto}.cover:after{display:none}}
</style>
</head>
<body>
<div class="top"></div>
<nav class="nav"><a class="brand" data-route="home"><span class="logo">F</span><span>ETF Flow Lab</span></a><div class="links"><a data-route="etf">ETF</a><a data-route="flow">法人 / 期貨</a><a data-route="indices">指數</a><a data-route="daily">筆記</a><a data-route="admin">後台</a></div></nav>
<div id="app"></div>
<script>
const DATA={siteVersion:'V13',marketDate:'2026-06-30',updated:'2026-07-01 10:00:00（台灣時間）',nextFullUpdate:'2026-07-01 21:00（台灣時間）',dataStatus:'目前完整盤後資料日期：2026-06-30；2026-07-01 當日完整版需等今日 21:00 台灣時間',tone:'中性偏保守',headline:'目前以 6/30 盤後資料為最新完整版本；7/1 當日資料尚未完整發布，先不混用未完成資料。',summary:'法人 / 期貨頁已更新為 6/30 可用資料：三大法人合計買超，但外資現貨賣超；外資期貨淨空單仍高，代表指數避險壓力需要留意。00981A 尚未接官方每日持股資料，因此不顯示舊持股明細。',points:['最新完整資料日為 2026/06/30，7/1 完整版需等 21:00 台灣時間。','三大法人合計買超 17.06 億元，但外資現貨賣超 5.09 億元。','外資期貨淨口數 -83,063 口，期貨端偏空或避險部位仍重。'],watch:['7/1 晚上 21:00 更新當日完整版','外資期貨淨空單是否縮小','00981A 官方每日持股資料是否完成串接'],institutional:[{name:'外資',value:-508728992},{name:'投信',value:755850342},{name:'自營商',value:1458507281}],futures:{foreignNet:-83063,note:'外資期貨淨口數為負，代表期貨端偏空或避險部位較重；應與三大法人現貨買賣超一起判斷。'},etfStatus:{code:'00981A',name:'統一台股增長主動式 ETF',manager:'陳釧瑤',sourceStatus:'待接官方每日投資組合',displayStatus:'目前不顯示舊持股明細',reason:'避免把舊資料或範例資料誤認為最新 00981A 持股。正式資料源接好後，才會顯示加碼、減碼、新增、刪除與權重變化。'},globalStatus:{status:'待接合法行情來源',note:'國際指數區目前只保留版面，不放假數字。正式版會分清楚：美股為前一交易日收盤；日股、韓股為當日收盤。'},note:'目前網站更新為 2026/06/30 盤後完整資料版。00981A 持股尚未接官方每日投資組合，因此不再顯示舊的範例持股。法人 / 期貨已合併觀察：三大法人合計買超 17.06 億元，其中外資賣超 5.09 億元、投信買超 7.56 億元、自營商買超 14.59 億元；外資期貨淨口數為 -83,063 口，代表指數端仍有避險或偏空壓力。'};
const fmt=new Intl.NumberFormat('zh-TW');const signed=n=>`${Number(n)>0?'+':''}${fmt.format(n)}`;const cls=n=>Number(n)>=0?'pos':'neg';function moneyShort(n){const a=Math.abs(n);if(a>=100000000)return `${n<0?'-':''}${(a/100000000).toFixed(2)} 億`;if(a>=10000)return `${n<0?'-':''}${(a/10000).toFixed(0)} 萬`;return signed(n)}const instTotal=DATA.institutional.reduce((a,b)=>a+b.value,0);function routeTo(r){location.hash=r==='home'?'':r;render();window.scrollTo({top:0,behavior:'smooth'})}document.querySelectorAll('[data-route]').forEach(a=>a.addEventListener('click',()=>routeTo(a.dataset.route)));function footer(){return `<footer class="footer">資料起算日：2026/06/30。所有時間統一顯示台灣時間。本站資料為盤後整理與研究用途，不構成投資建議。</footer>`}function pageHero(t,s,side){return `<header class="pageHero"><section class="pageTitle"><div class="kicker">Detail｜${DATA.marketDate}（台灣）</div><h1>${t}</h1><p>${s}</p></section><aside class="pageInfo">${side}</aside></header>`}
function home(){return `<header class="hero"><section class="cover"><div class="kicker">Latest Complete Update｜${DATA.marketDate}（台灣）</div><h1>Today’s<br/>Flow</h1><p class="lead">${DATA.headline}</p><div class="pills"><span class="pill">網站更新：${DATA.updated}</span><span class="pill">下一次完整版：${DATA.nextFullUpdate}</span><span class="warning">${DATA.dataStatus}</span></div></section><aside class="side"><div><div class="kicker">Today Tone</div><div class="tone">${DATA.tone}</div><p class="white">${DATA.summary}</p></div><button class="btn light" onclick="routeTo('daily')">Read Daily Note →</button></aside></header><main class="wrap"><section class="grid g3"><article class="card portal" onclick="routeTo('etf')"><div><div class="kicker">ETF Flow</div><h3>00981A 持股</h3><div class="warning">${DATA.etfStatus.displayStatus}</div><p class="meta" style="margin-top:14px">待接官方每日持股後，再顯示加碼、減碼、新增、刪除。</p></div><span class="btn">看資料狀態 →</span></article><article class="card portal" onclick="routeTo('flow')"><div><div class="kicker">Institutional + Futures</div><h3>法人 / 期貨</h3><div class="value ${cls(instTotal)}">${moneyShort(instTotal)}</div><p class="meta">三大法人合計；外資期貨 ${signed(DATA.futures.foreignNet)} 口。</p></div><span class="btn">進入觀察 →</span></article><article class="card portal" onclick="routeTo('indices')"><div><div class="kicker">Global Pulse</div><h3>國際指數</h3><div class="badge gray">${DATA.globalStatus.status}</div><p class="meta" style="margin-top:14px">不放假行情，等接正式來源。</p></div><span class="btn">查看狀態 →</span></article></section><section class="section"><h2>Latest complete day, not mixed data.</h2><p>現在顯示 6/30 完整盤後版；7/1 還沒完整公布前，不把部分資料混進去。</p></section><section class="grid g2"><article class="card"><div class="kicker">Three Lines</div><h3>目前三句話</h3><ul class="list">${DATA.points.map(x=>`<li>${x}</li>`).join('')}</ul></article><article class="card"><div class="kicker">Next Watch</div><h3>下一步觀察</h3><ul class="list">${DATA.watch.map(x=>`<li>${x}</li>`).join('')}</ul></article></section>${footer()}</main>`}
function etf(){return pageHero('00981A 持股資料','目前不顯示舊資料；待接官方每日投資組合後，再產生每日加碼、減碼、新增、刪除。',`<div class="kicker">ETF Focus</div><h3>${DATA.etfStatus.code}</h3><p class="meta">${DATA.etfStatus.name}</p><p class="meta">經理人：${DATA.etfStatus.manager}</p><div style="margin-top:16px"><span class="badge gray">${DATA.etfStatus.sourceStatus}</span></div>`)+`<main class="wrap"><section class="grid g2"><article class="card"><div class="kicker">Data Status</div><h3>${DATA.etfStatus.displayStatus}</h3><p class="lead">${DATA.etfStatus.reason}</p></article><article class="card"><div class="kicker">Expected Columns</div><h3>正式資料接好後會顯示</h3><ul class="list"><li>股票代號 / 股票名稱</li><li>昨日股數 / 今日股數 / 股數變化</li><li>昨日權重 / 今日權重 / 權重變化</li><li>加碼、減碼、新增、刪除</li><li>ETF + 法人共振判斷</li></ul></article></section><section class="section"><h2>持股明細</h2><p>正式來源尚未串接，所以這裡先不放舊範例資料。</p></section><article class="empty"><div class="kicker">Waiting for official source</div><h3>待接官方每日投資組合</h3><p class="lead">資料源接好後，此區會自動顯示 00981A 的每日持股變化。現在先保留空狀態，避免誤導。</p></article>${footer()}</main>`}
function flow(){return pageHero('法人 / 期貨觀察','把三大法人買賣超與外資期貨淨空單放在一起看，避免只看現貨或只看期貨。',`<div class="kicker">Institutional + Futures</div><h3>三大法人合計</h3><div class="value ${cls(instTotal)}">${moneyShort(instTotal)}</div><p class="meta">外資期貨：<b class="${cls(DATA.futures.foreignNet)}">${signed(DATA.futures.foreignNet)} 口</b></p>`)+`<main class="wrap"><section class="grid g2"><article class="card"><div class="kicker">Cash Market</div><h3>三大法人買賣超</h3>${DATA.institutional.map(x=>`<div class="stat"><div><b>${x.name}</b><div class="meta">當日淨買賣超</div></div><div class="value ${cls(x.value)}">${moneyShort(x.value)}</div></div>`).join('')}</article><article class="card"><div class="kicker">Futures Market</div><h3>外資期貨淨口數</h3><div class="value ${cls(DATA.futures.foreignNet)}">${signed(DATA.futures.foreignNet)} 口</div><p class="lead">${DATA.futures.note}</p></article></section><section class="section"><h2>合併解讀</h2><p>現貨代表今天股票市場實際買賣方向；期貨代表外資對指數的避險或方向部位。</p></section><section class="grid g3"><article class="card"><h3>現貨買、空單縮小</h3><p class="meta">條件較健康，偏多延續性較高。</p></article><article class="card"><h3>現貨買、空單擴大</h3><p class="meta">可能是買現貨但期貨避險，指數仍有壓力。</p></article><article class="card"><h3>現貨賣、空單擴大</h3><p class="meta">短線風險升高，需留意壓回。</p></article></section>${footer()}</main>`}
function indices(){return pageHero('國際指數','美股、日股、韓股走勢。',`<div class="kicker">Global Pulse</div><h3>${DATA.globalStatus.status}</h3><p class="meta">${DATA.globalStatus.note}</p>`)+`<main class="wrap"><section class="grid g2"><article class="card"><div class="kicker">Data Status</div><h3>不顯示假行情</h3><p class="lead">${DATA.globalStatus.note}</p></article><article class="card"><div class="kicker">Expected Rule</div><h3>正式版時間規則</h3><ul class="list"><li>日股、韓股：當日收盤。</li><li>美股：前一交易日收盤。</li><li>所有時間標台灣時間。</li></ul></article></section>${footer()}</main>`}
function daily(){return pageHero('每日資金流向筆記','把 ETF、法人、期貨、國際指數整理成白話。',`<div class="kicker">Daily Note</div><h3>${DATA.marketDate}（台灣）</h3><p class="meta">盤後整理，台灣時間。</p>`)+`<main class="wrap"><article class="card"><div class="kicker">Daily Note</div><h3>目前資金流向筆記</h3><p class="lead">${DATA.note}</p></article><section class="section"><h2>下一步觀察</h2></section><article class="card"><ul class="list">${DATA.watch.map(x=>`<li>${x}</li>`).join('')}</ul></article>${footer()}</main>`}
function admin(){return `<main class="wrap admin"><aside class="adminMenu"><div class="logo">F</div><h2>後台</h2><a onclick="routeTo('home')">回首頁</a><a onclick="routeTo('etf')">ETF頁</a><a onclick="routeTo('flow')">法人 / 期貨頁</a></aside><section class="card"><div class="kicker">Admin Demo</div><h1 style="font-size:50px">內容管理</h1><p class="lead">後台也維持同一套美感。正式部署後，這裡會接 data/latest.json 與發布流程。</p><div class="formgrid"><label>資料日期<input id="adminDate" value="${DATA.marketDate}"></label><label>市場語氣<input id="adminTone" value="${DATA.tone}"></label></div><label style="margin-top:16px">首頁大方向<input id="adminHeadline" value="${DATA.headline}"></label><label style="margin-top:16px">每日筆記<textarea id="adminNote">${DATA.note}</textarea></label><section class="card" style="box-shadow:none;margin-top:22px"><h3>三大法人 / 外資期貨</h3><div class="formgrid"><label>外資<input id="foreign" value="${DATA.institutional[0].value}"></label><label>投信<input id="trust" value="${DATA.institutional[1].value}"></label><label>自營商<input id="dealer" value="${DATA.institutional[2].value}"></label><label>外資期貨淨口數<input id="futuresInput" value="${DATA.futures.foreignNet}"></label></div></section><section class="card" style="box-shadow:none;margin-top:22px"><h3>00981A 資料狀態</h3><p class="lead">${DATA.etfStatus.displayStatus}｜${DATA.etfStatus.sourceStatus}</p></section><button onclick="buildJson()">產生 JSON</button><button onclick="downloadJson()">下載 latest.json</button><div class="code" id="jsonBox"></div></section></main>`}function buildJson(){document.getElementById('jsonBox').textContent=JSON.stringify(DATA,null,2)}function downloadJson(){buildJson();const blob=new Blob([document.getElementById('jsonBox').textContent],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='latest.json';a.click()}function render(){const r=(location.hash||'#home').replace('#','')||'home';const routes={home,etf,flow,indices,daily,admin};document.getElementById('app').innerHTML=(routes[r]||home)();document.querySelectorAll('.links a').forEach(a=>a.classList.toggle('active',a.dataset.route===r));if(r==='admin')buildJson()}window.addEventListener('hashchange',render);render();
</script>
</body>
</html>
