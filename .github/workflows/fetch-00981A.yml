name: Fetch 00981A official holdings

on:
  workflow_dispatch:
  schedule:
    # Taiwan 18:30, Monday to Friday. GitHub cron uses UTC.
    - cron: "30 10 * * 1-5"

permissions:
  contents: write

jobs:
  fetch-00981A:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parser dependency
        run: python -m pip install --upgrade pip openpyxl

      - name: Fetch official 00981A holdings
        run: python scripts/fetch_00981A_official.py

      - name: Commit updated holdings history
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/00981A/holdings-history.json
          git commit -m "Update 00981A official holdings history"
          git push
